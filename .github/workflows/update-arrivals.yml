name: Update Haneda Arrivals

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip if token not configured
        id: token-check
        env:
          ODPT_TOKEN: ${{ secrets.ODPT_TOKEN }}
        run: |
          if [ -z "$ODPT_TOKEN" ]; then
            echo "ODPT_TOKEN secret not set. Skipping fetch (mock data will remain)."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch arrivals
        if: steps.token-check.outputs.skip == 'false'
        env:
          ODPT_TOKEN: ${{ secrets.ODPT_TOKEN }}
        run: node scripts/fetch-arrivals.mjs
        # JST 5:00前はスクリプト側で early-exit する

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data/arrivals.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/arrivals.json
            git commit -m "chore(arrivals): auto-update $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
            git push
          else
            echo "No change. Skipping commit."
          fi
