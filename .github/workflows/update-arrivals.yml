name: Update Haneda Arrivals

on:
  schedule:
    # 5 分間隔。観測 tick (Mac mini launchd 5 分) と粒度を揃え、ODPT の
    # estimatedArrivalTime のリアルタイム更新を予測に反映しやすくする。
    # GitHub Actions cron は実際には数分遅延しうるため厳密な 5 分同期ではない。
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip if token not configured
        id: token-check
        env:
          ODPT_TOKEN: ${{ secrets.ODPT_TOKEN }}
        run: |
          if [ -z "$ODPT_TOKEN" ]; then
            echo "ODPT_TOKEN secret not set. Skipping fetch (mock data will remain)."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch arrivals
        if: steps.token-check.outputs.skip == 'false'
        env:
          ODPT_TOKEN: ${{ secrets.ODPT_TOKEN }}
        run: node scripts/fetch-arrivals.mjs
        # JST 5:00前はスクリプト側で early-exit する

      - name: Commit if changed
        env:
          ODPT_TOKEN: ${{ secrets.ODPT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            if [ -z "$(git status --porcelain data/arrivals.json)" ]; then
              echo "No change. Skipping commit."
              exit 0
            fi
            git add data/arrivals.json
            git commit -m "chore(arrivals): auto-update $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" || true
            if git push; then
              exit 0
            fi
            echo "push failed (attempt $i): refresh from remote and re-fetch arrivals"
            git rebase --abort 2>/dev/null || true
            git reset --hard origin/main 2>/dev/null || git reset --hard
            git fetch origin main
            git reset --hard origin/main
            if [ -n "$ODPT_TOKEN" ]; then
              node scripts/fetch-arrivals.mjs
            fi
            sleep $((i * 3))
          done
          echo "push failed after 3 retries"
          exit 1
