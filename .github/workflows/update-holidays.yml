name: Update Holidays

on:
  schedule:
    # 毎月1日 03:00 JST = 18:00 UTC (前日)
    - cron: '0 18 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch holidays
        run: node scripts/fetch-holidays.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain data/holidays.json)" ]; then
            echo "No change. Skipping commit."
            exit 0
          fi
          git add data/holidays.json
          git commit -m "chore(holidays): auto-update $(TZ=Asia/Tokyo date '+%Y-%m-%d JST')"
          git push
