name: Update Haneda Weather

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch weather (Open-Meteo, no auth)
        run: node scripts/fetch-weather.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data/weather.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/weather.json
            git commit -m "chore(weather): auto-update $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
            git push
          else
            echo "No change. Skipping commit."
          fi
