name: Update Haneda Weather

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch weather (Open-Meteo, no auth)
        run: node scripts/fetch-weather.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            if [ -z "$(git status --porcelain data/weather.json)" ]; then
              echo "No change. Skipping commit."
              exit 0
            fi
            git add data/weather.json
            git commit -m "chore(weather): auto-update $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" || true
            if git push; then
              exit 0
            fi
            echo "push failed (attempt $i): refresh from remote and re-fetch weather"
            git rebase --abort 2>/dev/null || true
            git reset --hard origin/main 2>/dev/null || git reset --hard
            git fetch origin main
            git reset --hard origin/main
            node scripts/fetch-weather.mjs
            sleep $((i * 3))
          done
          echo "push failed after 3 retries"
          exit 1
