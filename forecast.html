<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽田タクシー需要予測 (MVP)</title>
  <link rel="icon" type="image/png" sizes="180x180" href="./icon-180.png">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    :root { --bg: #0e0e10; --fg: #e8e8e8; --sub: #888; --accent: #4ea1ff; --high: #ffb84d; --very-high: #ff5252; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, system-ui, sans-serif; font-size: 15px; }
    .app-tabs {
      display: flex; position: sticky; top: 0; z-index: 10;
      background: #0a0a0f; border-bottom: 1px solid #222;
    }
    .app-tab {
      flex: 1; padding: 14px 8px; text-align: center; text-decoration: none;
      color: var(--sub); font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
      border-bottom: 3px solid transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .app-tab.active {
      color: var(--fg); border-bottom-color: var(--accent);
      background: rgba(78, 161, 255, 0.08);
    }
    .app-tab:active { background: rgba(255,255,255,0.05); }
    header { padding: 12px 16px; border-bottom: 1px solid #222; background: #0a0a0f; }
    h1 { margin: 0; font-size: 18px; }
    main { padding: 12px 16px; max-width: 760px; }
    .forecast-meta { margin: 8px 0 16px 0; color: var(--sub); font-size: 13px; line-height: 1.5; }
    .forecast-table { border-collapse: collapse; width: 100%; }
    .forecast-table th, .forecast-table td { padding: 6px 8px; border-bottom: 1px solid #222; text-align: right; font-variant-numeric: tabular-nums; }
    .forecast-table th { background: #16161c; color: var(--sub); font-weight: 500; font-size: 12px; }
    .forecast-table td.time { text-align: left; font-weight: 600; }
    .forecast-table tr.tier-high td { background: rgba(255, 184, 77, 0.10); }
    .forecast-table tr.tier-very-high td { background: rgba(255, 82, 82, 0.14); }
    .star { color: var(--very-high); font-weight: 700; }
    .factor-cell { color: var(--sub); font-size: 12px; }
    .total-cell { font-weight: 700; }
    .pattern-section { margin-top: 32px; padding-top: 16px; border-top: 1px solid #222; }
    .pattern-section h2 { font-size: 16px; margin: 0 0 8px 0; }
    .pattern-section h3 { font-size: 14px; margin: 16px 0 8px 0; color: var(--sub); }
    .pattern-meta { color: var(--sub); font-size: 13px; margin-bottom: 12px; line-height: 1.5; }
    .similar-day-list { list-style: none; padding: 0; margin: 0 0 16px 0; }
    .similar-day-item { padding: 6px 8px; border-bottom: 1px solid #222; display: flex; gap: 8px; align-items: center; font-variant-numeric: tabular-nums; }
    .similar-day-icon { font-size: 14px; }
    .similar-day-label { flex: 1; }
    .similar-day-score { color: var(--sub); font-size: 12px; }
    .accuracy-section { margin-top: 32px; padding-top: 16px; border-top: 1px solid #222; }
    .accuracy-section h2 { font-size: 16px; margin: 0 0 8px 0; }
    .accuracy-meta { color: var(--sub); font-size: 13px; margin-bottom: 12px; }
    .accuracy-table { border-collapse: collapse; width: 100%; max-width: 520px; }
    .accuracy-table th, .accuracy-table td { padding: 6px 10px; border-bottom: 1px solid #222; text-align: right; font-variant-numeric: tabular-nums; }
    .accuracy-table th { background: #16161c; color: var(--sub); font-weight: 500; font-size: 12px; }
    .accuracy-table td.lead { text-align: left; font-weight: 600; }
    .winner-fc { color: var(--accent); }
    .winner-pm { color: var(--high); }
    .ensemble-section { margin-bottom: 24px; }
    .ensemble-section h2 { font-size: 17px; margin: 0 0 8px 0; color: var(--accent); }
    .ensemble-meta { color: var(--sub); font-size: 12px; margin-bottom: 12px; line-height: 1.5; }
    .ensemble-table { border-collapse: collapse; width: 100%; }
    .ensemble-table th, .ensemble-table td { padding: 6px 8px; border-bottom: 1px solid #222; text-align: right; font-variant-numeric: tabular-nums; }
    .ensemble-table th { background: #16161c; color: var(--sub); font-weight: 500; font-size: 12px; }
    .ensemble-table td.time { text-align: left; font-weight: 600; }
    .ensemble-table tr.tier-high td { background: rgba(255, 184, 77, 0.10); }
    .ensemble-table tr.tier-very-high td { background: rgba(255, 82, 82, 0.14); }
    .correction-section { margin-top: 32px; padding-top: 16px; border-top: 1px solid #222; }
    .correction-section h2 { font-size: 16px; margin: 0 0 8px 0; }
    .correction-section h3 { font-size: 13px; margin: 14px 0 6px 0; color: var(--sub); }
    .correction-meta { color: var(--sub); font-size: 13px; margin-bottom: 12px; }
    .correction-table { border-collapse: collapse; width: 100%; max-width: 520px; }
    .correction-table th, .correction-table td { padding: 5px 10px; border-bottom: 1px solid #222; text-align: right; font-variant-numeric: tabular-nums; }
    .correction-table th { background: #16161c; color: var(--sub); font-weight: 500; font-size: 12px; }
    .correction-table td.label { text-align: left; font-weight: 600; }
    .src-learning { color: var(--accent); }
    .src-fallback { color: var(--sub); }
    .throughput-banner { font-size: 13px; padding: 8px 10px; border-radius: 6px; margin-bottom: 12px; }
    .throughput-banner.calibrated { background: rgba(78, 161, 255, 0.12); color: var(--accent); }
    .throughput-banner.pending { background: #16161c; color: var(--sub); }
  </style>
</head>
<body>
  <nav class="app-tabs" role="tablist" aria-label="アプリ切替">
    <a href="./" class="app-tab">⏱ 乗務タイマー</a>
    <a href="ic.html" class="app-tab">🛣 IC判定</a>
    <a href="arrivals.html" class="app-tab">✈ 到着便</a>
    <a href="forecast.html" class="app-tab active" aria-current="page">📈 予測</a>
  </nav>
  <header>
    <h1>羽田タクシー需要予測 (MVP)</h1>
  </header>
  <main>
    <div id="throughput-banner" class="throughput-banner"></div>
    <section class="ensemble-section" id="ensemble-section">
      <h2>統合予測 (今後 2 時間)</h2>
      <div id="ensemble-meta" class="ensemble-meta">読み込み中...</div>
      <div id="ensemble-table-wrap"></div>
    </section>

    <h2 style="font-size:15px;margin:24px 0 8px;color:var(--sub);">内訳: 短期予測 (ルールベース)</h2>
    <div id="forecast-meta" class="forecast-meta">読み込み中...</div>
    <div id="forecast-table-wrap"></div>

    <section class="pattern-section" id="pattern-section">
      <h2>類似日マッチング</h2>
      <div id="pattern-meta" class="pattern-meta">読み込み中...</div>
      <ul id="similar-days" class="similar-day-list"></ul>
      <h3>ヒストリカル予測 (類似日平均)</h3>
      <div id="historical-curve-wrap"></div>
    </section>

    <section class="accuracy-section" id="accuracy-section">
      <h2>予測精度 (直近 24 時間)</h2>
      <div id="accuracy-meta" class="accuracy-meta">読み込み中...</div>
      <div id="accuracy-table-wrap"></div>
    </section>

    <section class="correction-section" id="correction-section">
      <h2>係数補正状態</h2>
      <div id="correction-meta" class="correction-meta">読み込み中...</div>
      <div id="correction-level-wrap"></div>
      <div id="correction-share-wrap"></div>
    </section>
  </main>
  <script type="module" src="js/forecast-app.js"></script>
</body>
</html>
